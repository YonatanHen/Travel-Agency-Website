version: '3.8'

services:
  user-service:
    build: .
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - MONGODB_URL=mongodb://mongo:27017
      - MONGODB_DATABASE=user-service-db
      - JWT_SECRET=your-jwt-secret-key-change-this
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mongo
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=user-service-db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data: